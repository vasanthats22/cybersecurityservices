<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>Cyber Security · Stackly</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            /* font-family: 'Inter', sans-serif; */
            background: linear-gradient(145deg, #0c0f24 0%, #1b1f3e 100%);
            min-height: 100vh;
            color: #edf2ff;
        }

        .cyber-header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 10000;
            background: rgba(15, 20, 45, 0.35);
            backdrop-filter: blur(14px) saturate(200%);
            -webkit-backdrop-filter: blur(14px) saturate(200%);
            border-bottom: 1px solid rgba(0, 230, 200, 0.25);
            box-shadow: 0 8px 32px rgba(0, 20, 30, 0.5);
            transition: background 0.3s ease, backdrop-filter 0.3s ease, border-color 0.2s;
        }

        .cyber-header.scrolled {
            background: rgba(25, 15, 55, 0.85);
            backdrop-filter: blur(16px) saturate(220%);
            -webkit-backdrop-filter: blur(16px) saturate(220%);
            border-bottom: 2px solid #a97cff;
        }

        .navbar {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0.5rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 85px;
        }

        .logo a {
            display: flex;
            align-items: center;
            text-decoration: none;
            height: 70px;
        }
        
        .logo-img {
            height: 100px;
            width: auto;
            max-width: 220px;
            object-fit: contain;
            transition: opacity 0.2s;
            filter: drop-shadow(0 0 8px #5f9eff);
        }
        
        .logo a:hover .logo-img {
            opacity: 0.85;
        }

        .nav-center {
            display: flex;
            align-items: center;
            list-style: none;
            gap: 0.2rem;
        }
        
        .nav-center li a {
            display: inline-block;
            padding: 0.5rem 1rem;
            font-weight: 800;
            font-size: 0.9rem;
            letter-spacing: 0.02em;
            text-decoration: none;
            color: #f0f5ff;
            transition: color 0.2s, text-shadow 0.2s;
            white-space: nowrap;
            background: transparent;
            text-transform: uppercase;
        }

        .nav-center li a:hover {
            color: #a97cff;
            text-shadow: 0 0 6px #a97cff;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }
        
        .btn-login {
            background: transparent;
            border: 1.8px solid #4ec9e0;
            color: #f0f5ff;
            padding: 0.5rem 1.4rem;
            border-radius: 40px;
            font-weight: 700;
            font-size: 0.85rem;
            text-decoration: none;
            transition: all 0.25s;
            white-space: nowrap;
            letter-spacing: 0.02em;
        }
        
        .btn-login:hover {
            border-color: #a97cff;
            color: #a97cff;
            transform: translateY(-1px);
        }

        .btn-get-started {
            background: linear-gradient(135deg, #4ec9e0, #a97cff);
            color: white;
            padding: 0.6rem 1.6rem;
            border-radius: 40px;
            font-weight: 700;
            font-size: 0.85rem;
            text-decoration: none;
            transition: all 0.25s;
            white-space: nowrap;
            border: none;
            box-shadow: 0 6px 14px rgba(78, 201, 224, 0.3);
        }
        
        .btn-get-started:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 24px rgba(169, 124, 255, 0.4);
        }

        .hamburger {
            display: none;
            font-size: 2.2rem;
            background: transparent;
            border: none;
            color: #d0e2ff;
            cursor: pointer;
            transition: color 0.2s;
            padding: 0;
            line-height: 1;
        }
        
        .hamburger:hover {
            color: #a97cff;
        }

        .fullscreen-menu {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(8, 12, 30, 0.98);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            z-index: 20000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 2.5rem;
            transform: translateX(100%);
            transition: transform 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            visibility: hidden;
        }
        
        .fullscreen-menu.active {
            transform: translateX(0);
            visibility: visible;
        }

        .close-menu {
            position: absolute;
            top: 2rem;
            right: 2rem;
            font-size: 3rem;
            background: transparent;
            border: none;
            color: #4ec9e0;
            cursor: pointer;
            transition: color 0.2s;
        }
        
        .close-menu:hover {
            color: #a97cff;
        }

        .mobile-nav-links {
            display: flex;
            flex-direction: column;
            gap: 2rem;
            width: 80%;
            max-width: 350px;
            text-align: center;
        }
        
        .mobile-nav-links a {
            text-decoration: none;
            font-size: 1.6rem;
            font-weight: 800;
            color: #f0f5ff;
            transition: color 0.2s;
            background: transparent;
            padding: 0.5rem;
            text-transform: uppercase;
        }
        
        .mobile-nav-links a:hover {
            color: #a97cff;
        }

        .mobile-actions {
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .mobile-actions .btn-login {
            font-size: 1.3rem;
            padding: 0.7rem 2rem;
            border-width: 2px;
        }
        
        .mobile-actions .btn-get-started {
            font-size: 1.3rem;
            padding: 0.8rem 2.2rem;
        }

        @media screen and (max-width: 1000px) {
    .nav-center, .nav-right {
        display: none;
    }
    .hamburger {
        display: block;
    }
    .navbar {
        padding: 0 1.5rem;
        height: 100px;
    }
    .logo a {
        height: 90px;
    }
    .logo-img {
        max-width: 280px;
    }
}

@media screen and (max-width: 500px) {
    .navbar {
        height: 95px;
        padding: 0 1rem;
    }
    .logo a {
        height: 85px;
    }
    .logo-img {
        max-width: 260px;
    }
    .hamburger {
        font-size: 2.5rem;
    }
    .mobile-nav-links a {
        font-size: 1.5rem;
    }
}

        .hero-spacer {
            margin-top: 85px;
            height: 200vh;
            background: radial-gradient(circle at 20% 30%, #20284a, #0a0f20);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #b0c8ff;
            font-size: 2rem;
            font-weight: 600;
            text-align: center;
            padding: 2rem;
        }
        
        html, body {
            max-width: 100%;
            overflow-x: hidden;
        }
    </style>
</head>
<body>
    <header class="cyber-header" id="cyberHeader">
        <nav class="navbar">
            <div class="logo">
                <a href="index.html">
                    <img src="logo2.webp" alt="Stackly Cyber" class="logo-img">
                </a>
            </div>

            <ul class="nav-center">
                <li><a href="index.html">HOME</a></li>
                <li><a href="services.html">SERVICES</a></li>
                <li><a href="solutions.html">SOLUTIONS</a></li>
                <li><a href="insights.html">INSIGHTS</a></li>
                <li><a href="contact.html">CONTACT</a></li>
            </ul>

            <div class="nav-right">
                <a href="login.html" class="btn-login"><i class="fas fa-user-lock" style="margin-right:6px;"></i> LOGIN</a>
                <a href="signup.html" class="btn-get-started">GET STARTED →</a>
            </div>

            <button class="hamburger" id="hamburgerBtn" aria-label="Menu">
                <i class="fas fa-bars"></i>
            </button>
        </nav>
    </header>

    <div class="fullscreen-menu" id="fullscreenMenu">
        <button class="close-menu" id="closeMenuBtn" aria-label="Close">
            <i class="fas fa-times"></i>
        </button>

        <div class="mobile-nav-links">
            <a href="index.html">HOME</a>
            <a href="services.html">SERVICES</a>
            <a href="solutions.html">SOLUTIONS</a>
            <a href="insights.html">INSIGHTS</a>
            <a href="contact.html">CONTACT</a>
        </div>

        <div class="mobile-actions">
            <a href="login.html" class="btn-login"><i class="fas fa-user-lock"></i> LOGIN</a>
            <a href="signup.html" class="btn-get-started">GET STARTED →</a>
        </div>
    </div>


    <script>
        (function() {
            const header = document.getElementById('cyberHeader');
            const hamburger = document.getElementById('hamburgerBtn');
            const fullscreenMenu = document.getElementById('fullscreenMenu');
            const closeBtn = document.getElementById('closeMenuBtn');

            function handleScroll() {
                if (window.scrollY > 20) {
                    header.classList.add('scrolled');
                } else {
                    header.classList.remove('scrolled');
                }
            }
            window.addEventListener('scroll', handleScroll);
            handleScroll();

            if (hamburger) {
                hamburger.addEventListener('click', function(e) {
                    e.stopPropagation();
                    fullscreenMenu.classList.add('active');
                    document.body.style.overflow = 'hidden';
                });
            }

            function closeMenu() {
                fullscreenMenu.classList.remove('active');
                document.body.style.overflow = '';
            }

            if (closeBtn) {
                closeBtn.addEventListener('click', closeMenu);
            }

            window.addEventListener('keydown', function(e) {
                if (e.key === 'Escape' && fullscreenMenu.classList.contains('active')) {
                    closeMenu();
                }
            });

            document.querySelectorAll('.mobile-nav-links a, .mobile-actions a').forEach(link => {
                link.addEventListener('click', function() {
                    closeMenu();
                });
            });

            window.addEventListener('resize', function() {
                if (window.innerWidth > 1000 && fullscreenMenu.classList.contains('active')) {
                    closeMenu();
                }
            });
        })();
    </script>
</body>
</html>
